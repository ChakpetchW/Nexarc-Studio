<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Nexarc Studio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --admin-bg: #0a0a0a;
      --card-bg: rgba(255,255,255,0.05);
    }
    body { background: var(--admin-bg); color: #fff; cursor: default !important; }
    * { cursor: auto !important; }
    .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
    .admin-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; margin-bottom: 32px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { color: var(--text-body); font-size: 0.9rem; text-transform: uppercase; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-body); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 12px; color: #fff; font-family: inherit;
    }
    .form-group textarea { height: 100px; resize: vertical; }
    
    .btn-save { background: var(--gradient); color: #fff; border: none; padding: 12px 32px; border-radius: 100px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(200,16,46,0.3); }
    .btn-edit { color: var(--accent-start); border: none; background: none; cursor: pointer; font-weight: bold; margin-right: 12px; }
    .btn-delete { background: rgba(200,16,46,0.1); color: #ff4d4d; border: 1px solid rgba(200,16,46,0.2); padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .btn-delete:hover { background: #ff4d4d; color: #fff; }
    
    .login-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .login-box { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; width: 400px; }
    
    .thumb-preview { width: 60px; height: 40px; border-radius: 4px; object-fit: cover; }
    
    #statusMsg { position: fixed; bottom: 20px; right: 20px; padding: 16px 24px; border-radius: 8px; z-index: 1000; display: none; }
    .msg-success { background: #10b981; color: #fff; }
    .msg-error { background: #ef4444; color: #fff; }

    #formTitle { margin-bottom: 24px; }
    .cancel-edit { color: #888; text-decoration: underline; cursor: pointer; font-size: 0.9rem; margin-left: 15px; display: none; }
  </style>
</head>
<body>

  <!-- Login Overlay -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2 style="margin-bottom:24px;">Admin Access</h2>
      <div class="form-group" style="text-align:left;">
        <label>Email</label>
        <input type="email" id="adminEmail" placeholder="admin@example.com" style="width:100%; padding:14px; border-radius:8px; border:1px solid #444; background:#222; color:#fff; margin-bottom:15px;">
      </div>
      <div class="form-group" style="text-align:left;">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="รหัสผ่าน" style="width:100%; padding:14px; border-radius:8px; border:1px solid #444; background:#222; color:#fff; margin-bottom:20px;">
      </div>
      <button onclick="handleLogin()" id="loginBtn" class="btn-save" style="width:100%;">เข้าสู่ระบบ</button>
      <p id="loginError" style="color:#ff4d4d; margin-top:16px; font-size:0.9rem; display:none;">อีเมลหรือรหัสผ่านไม่ถูกต้อง</p>
      
      <div style="margin-top:20px; font-size:0.8rem; color:#888; border-top:1px solid #333; padding-top:15px;">
        <p>ยังไม่มีบัญชี? กรุณาเพิ่ม User ใน Supabase Auth Dashboard</p>
      </div>
    </div>
  </div>

  <div class="admin-container">
    <div class="admin-header">
      <h1>Projects <span class="gradient-text">Management</span></h1>
      <div>
        <a href="works.html" target="_blank" style="color:var(--text-body); text-decoration:none; margin-right:20px;">ไปที่หน้าเว็บ →</a>
        <button onclick="handleLogout()" style="background:none; border:1px solid #444; color:#888; padding:8px 16px; border-radius:100px; cursor:pointer;">ออกจากระบบ</button>
      </div>
    </div>

    <!-- Form -->
    <div class="admin-card">
      <h3 id="formTitle">เพิ่มผลงานใหม่ <span class="cancel-edit" id="cancelEdit" onclick="resetForm()">ยกเลิกการแก้ไข</span></h3>
      <form id="projectForm">
        <input type="hidden" id="editingId">
        <input type="hidden" id="existingImageUrl">

        <div class="form-grid">
          <div class="form-group">
            <label>ชื่อโปรเจกต์</label>
            <input type="text" id="title" required placeholder="เช่น Angelishoes Experience">
          </div>
          <div class="form-group">
            <label>หมวดหมู่</label>
            <select id="category">
              <option value="Web Application">Web Application</option>
              <option value="WordPress Site">WordPress Site</option>
              <option value="E-Commerce">E-Commerce</option>
              <option value="Data Platform">Data Platform</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label>รายละเอียด</label>
          <textarea id="description" required placeholder="เล่าเกี่ยวกับงานนี้สั้นๆ..."></textarea>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>ลิงก์เว็บไซต์ (ถ้ามี)</label>
            <input type="url" id="project_url" placeholder="https://example.com">
          </div>
          <div class="form-group">
            <label>วันที่แสดง (เช่น มีนาคม 2567)</label>
            <input type="text" id="project_date" placeholder="เช่น มีนาคม 2567" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>รูปภาพผลงาน (เลือกใหม่เมื่อต้องการเปลี่ยน)</label>
            <input type="file" id="imageFile" accept="image/*">
            <p style="font-size:0.8rem; color:var(--text-body); margin-top:8px;">แนะนำ 1200x800px</p>
          </div>
          <div class="form-group">
            <label>Tags (คั่นด้วยคอมม่า ,)</label>
            <input type="text" id="tags" placeholder="React, Python, AWS">
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-save">บันทึกผลงาน</button>
      </form>
    </div>

    <!-- List -->
    <div class="admin-card">
      <h3 style="margin-bottom:24px;">รายการผลงานปัจจุบัน</h3>
      <table>
        <thead>
          <tr>
            <th>รูป</th>
            <th>ชื่อโปรเจกต์</th>
            <th>วันที่</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="projectListBody">
          <!-- Rows injected here -->
        </tbody>
      </table>
    </div>
  </div>

  <div id="statusMsg"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://dmlmntzgqfygmbxenywk.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbG1udHpncWZ5Z21ieGVueXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDI2OTEsImV4cCI6MjA4OTU3ODY5MX0.GEeyFyfxng9KoOfs6Ojvrv0oGFfU0RYDE0L4B4bv-oI';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // -- Authentication --
    async function checkSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        document.getElementById('loginOverlay').style.display = 'none';
        loadProjects();
      } else {
        document.getElementById('loginOverlay').style.display = 'flex';
      }
    }

    async function handleLogin() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPass').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');

      btn.innerText = 'กำลังตรวจสอบ...';
      btn.disabled = true;
      err.style.display = 'none';

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        err.innerText = error.message;
        err.style.display = 'block';
        btn.innerText = 'เข้าสู่ระบบ';
        btn.disabled = false;
      } else {
        document.getElementById('loginOverlay').style.display = 'none';
        loadProjects();
      }
    }

    async function handleLogout() {
      await supabaseClient.auth.signOut();
      window.location.reload();
    }

    checkSession();

    let projectsData = []; // Store current projects globaly for easy access

    async function loadProjects() {
      const tbody = document.getElementById('projectListBody');
      const { data, error } = await supabaseClient.from('projects').select('*').order('created_at', { ascending: false });
      
      if (error) {
        console.error('Supabase Load Error:', error);
        return showStatus('โหลดข้อมูลไม่สำเร็จ', 'error');
      }
      
      projectsData = data;
      tbody.innerHTML = data.map((p, index) => `
        <tr>
          <td><img src="${p.image_url}" class="thumb-preview"></td>
          <td>${p.title}</td>
          <td>${p.project_date || 'N/A'}</td>
          <td>
            <button class="btn-edit" onclick="prepareEdit(${index})">แก้ไข</button>
            <button class="btn-delete" onclick="deleteProject('${p.id}')">ลบ</button>
          </td>
        </tr>
      `).join('');
    }

    function prepareEdit(index) {
      const p = projectsData[index];
      document.getElementById('editingId').value = p.id;
      document.getElementById('title').value = p.title;
      document.getElementById('category').value = p.category;
      document.getElementById('description').value = p.description;
      document.getElementById('project_url').value = p.project_url || '';
      document.getElementById('project_date').value = p.project_date || '';
      document.getElementById('tags').value = (p.tags && Array.isArray(p.tags)) ? p.tags.join(', ') : '';
      document.getElementById('existingImageUrl').value = p.image_url;
      
      document.getElementById('formTitle').innerText = 'แก้ไขผลงาน: ' + p.title;
      document.getElementById('cancelEdit').style.display = 'inline';
      document.getElementById('submitBtn').innerText = 'อัปเดตผลงาน';
      document.getElementById('imageFile').required = false;
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      form.reset();
      document.getElementById('editingId').value = '';
      document.getElementById('formTitle').innerHTML = 'เพิ่มผลงานใหม่ <span class="cancel-edit" id="cancelEdit" onclick="resetForm()">ยกเลิกการแก้ไข</span>';
      document.getElementById('submitBtn').innerText = 'บันทึกผลงาน';
      document.getElementById('imageFile').required = true;
    }

    const form = document.getElementById('projectForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const editingId = document.getElementById('editingId').value;
      
      btn.disabled = true;
      btn.innerText = 'กำลังประมวลผล...';

      try {
        let imageUrl = document.getElementById('existingImageUrl').value;
        const file = document.getElementById('imageFile').files[0];

        if (file) {
          const fileName = `${Date.now()}-${file.name}`;
          const { data: uploadData, error: uploadError } = await supabaseClient.storage
            .from('project-images').upload(fileName, file);
          if (uploadError) throw uploadError;
          const { data: publicUrlData } = supabaseClient.storage
            .from('project-images').getPublicUrl(fileName);
          imageUrl = publicUrlData.publicUrl;
        }

        const projectData = {
          title: document.getElementById('title').value,
          description: document.getElementById('description').value,
          category: document.getElementById('category').value,
          project_url: document.getElementById('project_url').value,
          project_date: document.getElementById('project_date').value,
          image_url: imageUrl,
          tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t)
        };

        if (editingId) {
          const { error } = await supabaseClient.from('projects').update(projectData).eq('id', editingId);
          if (error) throw error;
          showStatus('อัปเดตผลงานสำเร็จ!', 'success');
        } else {
          const { error } = await supabaseClient.from('projects').insert([projectData]);
          if (error) throw error;
          showStatus('บันทึกผลงานสำเร็จ!', 'success');
        }

        resetForm();
        loadProjects();

      } catch (err) {
        showStatus('เกิดข้อผิดพลาด: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerText = editingId ? 'อัปเดตผลงาน' : 'บันทึกผลงาน';
      }
    });

    async function deleteProject(id) {
      if (!confirm('ยืนยันที่จะลบโปรเจกต์นี้?')) return;
      const { error } = await supabaseClient.from('projects').delete().eq('id', id);
      if (error) return showStatus('ลบไม่สำเร็จ', 'error');
      showStatus('ลบผลงานออกแล้ว', 'success');
      loadProjects();
    }

    function showStatus(msg, type) {
      const div = document.getElementById('statusMsg');
      div.innerText = msg;
      div.className = type === 'success' ? 'msg-success' : 'msg-error';
      div.style.display = 'block';
      setTimeout(() => div.style.display = 'none', 3000);
    }
  </script>
</body>
</html>
